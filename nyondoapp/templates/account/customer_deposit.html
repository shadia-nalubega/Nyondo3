<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NyondoStock · Deposit Scheme</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />

  <style>
    body {
      background: #f4f7fc;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <div
    class="container d-flex justify-content-center align-items-center min-vh-100 py-5"
  >
    <form
      method="POST"
      action="{% url 'customer_deposit' %}"
      class="shadow-lg p-4 rounded bg-white"
      style="max-width: 780px; width: 100%"
    >
      {% csrf_token %}

      <div class="text-center mb-4">
        <h1 class="text-primary">NYONDOSTOCK</h1>
        <h4 class="text-secondary">Deposit Scheme Form</h4>
        <hr />
      </div>

      <!-- Customer Information Section -->
      <h4 class="mt-3 mb-3 text-primary border-bottom pb-2">
        Customer Information
      </h4>

      <div class="mb-3">
        <label for="customer_name" class="form-label fw-bold"
          >Customer Name</label
        >
        <input
          type="text"
          name="customer_name"
          id="customer_name"
          class="form-control"
          required
        />
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="phone" class="form-label fw-bold">Phone Number</label>
          <input
            type="text"
            name="phone"
            id="phone"
            class="form-control"
            required
          />
        </div>
        <div class="col-md-6">
          <label for="product_name" class="form-label fw-bold"
            >Product Name</label
          >
          <input
            type="text"
            name="product_name"
            id="product_name"
            class="form-control"
            required
          />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-12">
          <label for="nin" class="form-label fw-bold">NIN Number</label>
          <input
            type="text"
            name="nin"
            id="nin"
            class="form-control"
            required
          />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="location" class="form-label fw-bold">Location</label>
          <input
            type="text"
            name="location"
            id="location"
            class="form-control"
            required
          />
        </div>
        <div class="col-md-6">
          <label for="total_price" class="form-label fw-bold"
            >Total Price (UGX)</label
          >
          <input
            type="number"
            name="total_price"
            id="total_price"
            class="form-control"
            required
          />
        </div>
      </div>

      <!-- Deposit Information Section -->
      <h4 class="mt-4 mb-3 text-primary border-bottom pb-2">
        Deposit Information
      </h4>

      <div class="row mb-3">
        <div class="col-md-4">
          <label for="deposit_amount" class="form-label fw-bold"
            >Deposit Amount (UGX)</label
          >
          <input
            type="number"
            name="deposit_amount"
            id="deposit_amount"
            class="form-control"
            required
          />
        </div>
        <div class="col-md-4">
          <label for="deposit_date" class="form-label fw-bold"
            >Deposit Date</label
          >
          <input
            type="date"
            name="deposit_date"
            id="deposit_date"
            class="form-control"
            required
          />
        </div>
        <div class="col-md-4">
          <label for="remaining_balance" class="form-label fw-bold"> Remaining Balance </label>
          <input type="text" name="remaining_balance" id="remaining_balance" class="form-control" style="font-weight: bold;" />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="expected_completion" class="form-label fw-bold"
            >Expected Completion</label
          >
          <input
            type="date"
            name="expected_completion"
            id="expected_completion"
            class="form-control"
            required
          />
        </div>
        <div class="col-md-6">
          <label for="status" class="form-label fw-bold">Status</label>
          <select name="status" id="status" class="form-select" required>
            <option value="Active" selected>Active</option>
            <option value="Pending">Pending</option>
            <option value="Finished">Finished</option>
          </select>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-12">
          <label for="received_by" class="form-label fw-bold"
            >Received By (Cashier/Admin)</label
          >
          <input
            type="text"
            name="received_by"
            id="received_by"
            class="form-control"
            required
          />
        </div>
      </div>

      <!-- Buttons -->
      <div class="d-flex justify-content-center gap-3 mt-4 pt-3 border-top">
        <button type="submit" class="btn btn-primary px-4 py-2">
          Submit Deposit
        </button>
        <button
          type="button"
          class="btn btn-secondary px-4 py-2"
          onclick="window.location.href='{% url 'temp_receipt' %}'"
        >
          Print Receipt
        </button>
      </div>

      <p class="text-center mt-4 text-muted small">
        &copy; NyondoStock Hardware 2026
      </p>
    </form>
  </div>
  
  <script>
    
    // Set deposit date to today
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, "0");
    const day = String(today.getDate()).padStart(2, "0");
    const todayDate = `${year}-${month}-${day}`;
    document.getElementById("deposit_date").value = todayDate;
    document.getElementById("expected_completion").min = todayDate;
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</body>
</html>
