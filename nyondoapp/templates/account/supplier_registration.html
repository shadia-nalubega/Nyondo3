<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} shadia {% endblock %}</title>
    <!-- Add Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{% static 'account/css/credit.css' %}" />
  </head>
  <style>
    section.content {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
  </style>

  <body>
    <section class="content">
      <form
        method="post"
        action="{% url 'supplier_registration' %}"
        class="content"
      >
        {% csrf_token %}
        <div class="parent-container">
          <section class="header text-center">
            <h2 class="mt-4 mb-3 text-primary  pb-2"> NyondoStock </h2>
            <h3>Supplier Registration</h3>
          </section>
<hr>
          <h5 class="mt-4 mb-3 text-primary  pb-2">COMPANY DETAILS</h5>

          <div class="customer">
            <div class="col-md-6 mb-3">
              <label for="Company" class="form-label">Company Name</label>
              <input
                type="text"
                class="form-control"
                name="company_name"
                value="{{ company_name }}"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="TRN" class="form-label">TRN</label>
              <input
                type="text"
                class="form-control"
                placeholder="Input your TRN"
                name="TRN"
                value="{{ TRN }}"
              />
            </div>
          </div>

          <div class="customer">
            <div class="col-md-6 mb-3">
              <label for="location" class="form-label">Location</label>
              <input
                type="text"
                class="form-control"
                placeholder="Input your location"
                name="location"
                value="{{ location }}"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="Email" class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                placeholder="Input your Email"
                name="email"
                value="{{ email }}"
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="product_description" class="form-label"
              >Product Description</label
            >
            <textarea
              class="form-control"
              name="product_description"
              placeholder="Enter product description"
              rows="3"
            ></textarea>
          </div>

          <div class="customer">
            <div class="col-md-6 mb-3">
              <label for="phone" class="form-label">Phone Number</label>
              <input
                type="tel"
                class="form-control"
                name="phone"
                value="{{ phone }}"
              />
            </div>
            <div class="col-md-6 mb-3">
              <label for="payment_option" class="form-label"
                >Payment Terms</label
              >
              <select
                class="form-select"
                aria-label="Default select example"
                name="payment_option"
              >
                <option value="cash">cash</option>
                <option value="bank-transfer">bank-transfer</option>
                <option value="card-payment">card-payment</option>
                <option value="check">cheque</option>
                <option value="check">Credit Options</option>
                <option value="check">All above</option>
              </select>
            </div>
          </div>

          <div class="footer">
            <div class="buttons d-flex justify-content-center gap-3 mt-4">
              <button type="submit" class="btn btn-primary px-4">
                Register
              </button>
              <button type="reset" class="btn btn-secondary px-4">Reset</button>
            </div>
          </div>

          <p class="text-center mt-3">&copy;copyright NyondoStock 2026</p>
        </div>
      </form>
    </section>

    <!-- Add Bootstrap JS (optional, for better interactivity) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
